global_costmap:
  global_frame: map  # 全局代价地图参考坐标系
  robot_base_frame: base_footprint  # 机器人底盘坐标系
  update_frequency: 3.0  # 全局代价地图更新频率
  publish_frequency: 3.0  # 全局代价地图发布频率
  static_map: true  # 是否使用静态地图

  transform_tolerance: 0.8  # TF坐标变换容忍时间
  cost_scaling_factor: 9.0  # 膨胀代价衰减系数
  inflation_radius: 0.34  # 障碍物膨胀半径

  plugins:
    - {name: static_layer, type: "costmap_2d::StaticLayer"}  # 静态地图层插件
    - {name: obstacle_layer, type: "costmap_2d::VoxelLayer"}  # 障碍物层插件
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}  # 膨胀层插件
