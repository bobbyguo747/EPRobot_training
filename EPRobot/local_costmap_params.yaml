local_costmap:
  global_frame: map  # 局部代价地图参考坐标系
  robot_base_frame: base_footprint  # 机器人底盘坐标系

  update_frequency: 5.0  # 局部代价地图更新频率
  publish_frequency: 3.0  # 局部代价地图发布频率

  static_map: false  # 是否使用静态地图
  rolling_window: true  # 是否使用滚动窗口

  width: 3.2  # 局部代价地图宽度
  height: 3.2  # 局部代价地图高度
  resolution: 0.05  # 局部代价地图分辨率

  transform_tolerance: 0.5  # TF坐标变换容忍时间

  plugins:
   - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}  # 障碍物层插件
   - {name: inflation_layer, type: "costmap_2d::InflationLayer"}  # 膨胀层插件
