# ================= move_base主控制参数 =================
controller_frequency: 10.0  # 局部控制循环频率
controller_patience: 10.0  # 局部规划失败等待时间

planner_frequency: 0.5  # 全局规划循环频率
planner_patience: 5.0  # 全局规划失败等待时间

conservative_reset_dist: 0.2  # 保守清除代价地图距离

oscillation_timeout: 10.0  # 振荡检测时间阈值
oscillation_distance: 0.25  # 振荡检测距离阈值

clearing_rotation_allowed: false  # 是否允许旋转清障恢复
