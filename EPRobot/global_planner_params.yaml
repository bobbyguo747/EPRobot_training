GlobalPlanner:
  allow_unknown: false  # 是否允许路径经过未知区域
  default_tolerance: 0.25  # 目标点搜索容忍距离
  visualize_potential: false  # 是否可视化势场
  use_dijkstra: True  # 是否使用Dijkstra算法
  use_quadratic: true  # 是否使用二次函数近似势场
  use_grid_path: false  # 是否使用网格路径
  old_navfn_behavior: false  # 是否使用旧版navfn行为

  lethal_cost: 200  # 致命障碍物代价阈值
  neutral_cost: 60  # 自由空间基础代价
  cost_factor: 0.7  # 代价地图到路径势场的缩放系数
  publish_potential: true  # 是否发布势场
  orientation_mode: 0  # 全局路径方向模式
  orientation_window_size: 1  # 全局路径方向计算窗口
