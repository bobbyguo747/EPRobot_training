# ================= 机器人外形与代价地图公共参数 =================
footprint: [[0.14, -0.12], [0.14, 0.12], [-0.20, 0.12], [-0.20, -0.12]]  # 机器人轮廓顶点
footprint_padding: 0.01  # 机器人轮廓额外膨胀边距
transform_tolerance: 0.5  # TF坐标变换容忍时间
map_type: map  # 代价地图类型

obstacle_layer:
  enabled: true  # 是否启用障碍物层
  obstacle_range: 2.5  # 障碍物标记最大距离
  raytrace_range: 3.0  # 障碍物清除最大距离
  track_unknown_space: false  # 是否跟踪未知区域
  combination_method: 1  # 图层融合方式
  observation_sources: laser_scan_sensor  # 障碍物观测源列表
  laser_scan_sensor: {data_type: LaserScan, topic: scan, marking: true, clearing: true}  # 激光雷达观测源配置

inflation_layer:
  enabled: true  # 是否启用膨胀层
  cost_scaling_factor: 9.0  # 膨胀代价衰减系数
  inflation_radius: 0.24  # 障碍物膨胀半径

static_layer:
  enabled: true  # 是否启用静态地图层
  map_topic: "/map"  # 静态地图话题
