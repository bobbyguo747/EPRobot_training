TebLocalPlannerROS:

  odom_topic: /odometry/filtered  # TEB使用的里程计话题

  teb_autosize: True  # 是否自动调整TEB轨迹点数量
  dt_ref: 0.45  # 轨迹相邻位姿的参考时间间隔
  dt_hysteresis: 0.12  # 轨迹时间间隔的滞回范围
  global_plan_overwrite_orientation: False  # 是否用全局路径方向覆盖局部路径方向
  allow_init_with_backwards_motion: False  # 是否允许用倒车初始化轨迹
  max_global_plan_lookahead_dist: 0.9  # 局部规划器沿全局路径向前看的最大距离
  feasibility_check_no_poses: 8  # 轨迹可行性检查的位姿数量
  exact_arc_length: False  # 是否使用精确弧长计算轨迹长度
  force_reinit_new_goal_dist: 0.25  # 新目标距离变化超过该值时重新初始化轨迹
  force_reinit_new_goal_angular: 0.25  # 新目标角度变化超过该值时重新初始化轨迹

  max_vel_x: 1.00  # 最大前进线速度
  max_vel_x_backwards: 0.25  # 最大后退线速度
  max_vel_y: 0.0  # 最大横向速度
  max_vel_theta: 1.00  # 最大角速度
  acc_lim_x: 0.75  # 最大前后线加速度
  acc_lim_theta: 0.75  # 最大角加速度

  min_turning_radius: 0.40  # 阿克曼底盘最小转弯半径
  wheelbase: 0.21  # 前后轮轴距
  cmd_angle_instead_rotvel: False  # 是否输出转向角而不是角速度

  is_footprint_dynamic: False  # 是否使用动态机器人轮廓
  footprint_model:
    type: "polygon"  # TEB使用的机器人轮廓类型
    vertices: [[0.14, -0.12], [0.14, 0.12], [-0.20, 0.12], [-0.20, -0.12]]  # 机器人轮廓顶点

  xy_goal_tolerance: 0.18  # 目标点位置容差
  yaw_goal_tolerance: 1.20  # 目标点角度容差
  free_goal_vel: False  # 是否允许到达目标点时保持速度

  min_obstacle_dist: 0.16  # 轨迹与障碍物的最小距离
  inflation_dist: 0.28  # TEB障碍物代价影响距离
  include_costmap_obstacles: True  # 是否使用代价地图中的障碍物
  include_dynamic_obstacles: False  # 是否使用动态障碍物
  costmap_obstacles_behind_robot_dist: 0.10  # 机器人后方参与规划的障碍物距离
  dynamic_obstacle_inflation_dist: 0.28  # 动态障碍物代价影响距离
  obstacle_poses_affected: 8  # 单个障碍物影响的轨迹位姿数量
  costmap_converter_plugin: ""  # 代价地图障碍物转换插件
  costmap_converter_spin_thread: True  # 是否为转换插件开启线程
  costmap_converter_rate: 5  # 转换插件运行频率
  legacy_obstacle_association: False  # 是否使用旧版障碍物关联方式
  obstacle_association_cutoff_factor: 5.0  # 障碍物关联截断系数
  obstacle_association_force_inclusion_factor: 1.5  # 障碍物强制关联系数

  no_inner_iterations: 3  # 优化器内层迭代次数
  no_outer_iterations: 2  # 优化器外层迭代次数
  optimization_activate: True  # 是否启用轨迹优化
  optimization_verbose: False  # 是否输出优化器详细信息
  penalty_epsilon: 0.15  # 软约束惩罚缓冲量
  weight_max_vel_x: 2.0  # 最大线速度约束权重
  weight_max_vel_theta: 1.0  # 最大角速度约束权重
  weight_acc_lim_x: 1.0  # 线加速度约束权重
  weight_acc_lim_theta: 1.0  # 角加速度约束权重
  weight_kinematics_nh: 1000.0  # 非完整运动学约束权重
  weight_kinematics_forward_drive: 25000.0  # 前进运动偏好权重
  weight_kinematics_turning_radius: 3.0  # 最小转弯半径约束权重
  weight_optimaltime: 0.8  # 轨迹时间优化权重
  weight_obstacle: 35.0  # 障碍物距离约束权重
  weight_dynamic_obstacle: 20.0  # 动态障碍物约束权重
  obstacle_cost_exponent: 2.0  # 障碍物代价指数
  weight_adapt_factor: 1.1  # 权重自适应放大系数
  weight_dynamic_obstacle_inflation: 1.0  # 动态障碍物膨胀约束权重
  weight_inflation: 0.15  # 膨胀区约束权重
  weight_shortest_path: 0.2  # 最短路径约束权重
  weight_viapoint: 20.0  # 全局路径途经点跟随权重

  enable_homotopy_class_planning: False  # 是否启用同伦路径规划
  enable_multithreading: True  # 是否启用多线程
  simple_exploration: False  # 是否使用简单同伦探索
  max_number_classes: 1  # 最大候选路径类别数量
  selection_cost_hysteresis: 1.0  # 候选路径切换滞回系数
  selection_obst_cost_scale: 1.0  # 候选路径障碍物代价缩放系数
  selection_viapoint_cost_scale: 1.0  # 候选路径途经点代价缩放系数
  selection_alternative_time_cost: False  # 是否使用替代时间代价
  roadmap_graph_no_samples: 10  # 同伦路线图采样点数量
  roadmap_graph_area_width: 3  # 同伦路线图采样区域宽度
  roadmap_graph_area_length_scale: 1.0  # 同伦路线图采样区域长度缩放
  h_signature_prescaler: 0.5  # H-signature预缩放系数
  h_signature_threshold: 0.1  # H-signature判定阈值
  obstacle_keypoint_offset: 0.1  # 障碍物关键点偏移量
  obstacle_heading_threshold: 0.45  # 障碍物朝向阈值
  visualize_hc_graph: False  # 是否显示同伦图

  global_plan_viapoint_sep: 0.60  # 全局路径途经点采样间隔
  via_points_ordered: True  # 是否按顺序跟随途经点

  oscillation_recovery: False  # 是否启用TEB振荡恢复
  shrink_horizon_backup: False  # 是否启用缩短规划视野恢复
